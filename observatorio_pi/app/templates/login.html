{% extends "base.html" %}
{% block title %}Login — Projetos Integradores{% endblock %}

{% block body %}
<div class="login-wrapper">
    <div class="login-card">

        <!-- Cabeçalho azul -->
        <div class="login-card-header">
            <div class="d-flex justify-content-center mb-3">
                <img src="/static/img/nexus-senac.png"
                     alt="NEXUS Senac"
                     style="height:70px;width:auto;display:block;
                            filter: brightness(0) invert(1) sepia(1) saturate(3) hue-rotate(175deg);">
            </div>
            <div class="brand-name mb-0">Projetos <span>Integradores</span></div>
        </div>

        <!-- Corpo do formulário -->
        <div class="login-card-body">
            <p class="fw-semibold mb-4" style="color:#1a1a2e;font-size:.95rem;">
                Acesse sua conta
            </p>

            {% if erro %}
            <div class="alert alert-danger d-flex align-items-center gap-2 py-2 mb-4" role="alert">
                <i class="bi bi-exclamation-triangle-fill flex-shrink-0"></i>
                <span style="font-size:.875rem;">{{ erro }}</span>
            </div>
            {% endif %}

            <form method="post" action="/login" novalidate>
                <div class="mb-3">
                    <label for="email" class="form-label fw-semibold" style="font-size:.85rem;color:#374151;">
                        E-mail
                    </label>
                    <div class="input-group">
                        <span class="input-group-text" style="background:#f8fafc;border-color:#e4eaf2;">
                            <i class="bi bi-envelope" style="color:var(--senac-blue);"></i>
                        </span>
                        <input type="email" id="email" name="email"
                               class="form-control" style="border-color:#e4eaf2;"
                               placeholder="seu@email.com"
                               autocomplete="email" required>
                    </div>
                </div>

                <div class="mb-4">
                    <label for="senha" class="form-label fw-semibold" style="font-size:.85rem;color:#374151;">
                        Senha
                    </label>
                    <div class="input-group">
                        <span class="input-group-text" style="background:#f8fafc;border-color:#e4eaf2;">
                            <i class="bi bi-lock" style="color:var(--senac-blue);"></i>
                        </span>
                        <input type="password" id="senha" name="senha"
                               class="form-control" style="border-color:#e4eaf2;"
                               placeholder="••••••••"
                               autocomplete="current-password" required>
                        <button class="btn" type="button" id="toggleSenha" tabindex="-1"
                                style="background:#f8fafc;border-color:#e4eaf2;border-left:none;">
                            <i class="bi bi-eye" id="iconeSenha" style="color:#9aa5b4;"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold"
                        style="border-radius:8px;font-size:.95rem;">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Entrar
                </button>
            </form>
        </div>

        <!-- Rodapé -->
        <div class="text-center pb-4" style="font-size:.75rem;color:#9aa5b4;">
            <i class="bi bi-shield-lock me-1"></i>Acesso restrito a usuários cadastrados
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
document.getElementById('toggleSenha').addEventListener('click', function () {
    const input = document.getElementById('senha');
    const icone = document.getElementById('iconeSenha');
    if (input.type === 'password') {
        input.type = 'text';
        icone.className = 'bi bi-eye-slash';
    } else {
        input.type = 'password';
        icone.className = 'bi bi-eye';
    }
});
</script>
{% endblock %}
