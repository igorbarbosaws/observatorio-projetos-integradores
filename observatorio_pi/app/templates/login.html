{% extends "base.html" %}
{% block title %}Login — Observatório PI{% endblock %}

{% block content %}
<div class="text-center mb-4">
    <i class="bi bi-mortarboard-fill text-primary" style="font-size: 3rem;"></i>
    <h4 class="mt-2 fw-bold">Observatório PI</h4>
    <p class="text-muted small">Projetos Integradores — ADS</p>
</div>

<div class="card p-4 shadow-sm">
    <h5 class="mb-4 fw-semibold">Entrar no sistema</h5>

    {% if erro %}
    <div class="alert alert-danger d-flex align-items-center gap-2 py-2" role="alert">
        <i class="bi bi-exclamation-triangle-fill"></i>
        <span>{{ erro }}</span>
    </div>
    {% endif %}

    <form method="post" action="/login" novalidate>
        <div class="mb-3">
            <label for="email" class="form-label fw-medium">E-mail</label>
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                <input
                    type="email"
                    id="email"
                    name="email"
                    class="form-control"
                    placeholder="seu@email.com"
                    autocomplete="email"
                    required
                >
            </div>
        </div>

        <div class="mb-4">
            <label for="senha" class="form-label fw-medium">Senha</label>
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                <input
                    type="password"
                    id="senha"
                    name="senha"
                    class="form-control"
                    placeholder="••••••••"
                    autocomplete="current-password"
                    required
                >
                <button class="btn btn-outline-secondary" type="button" id="toggleSenha" tabindex="-1">
                    <i class="bi bi-eye" id="iconeSenha"></i>
                </button>
            </div>
        </div>

        <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
            <i class="bi bi-box-arrow-in-right me-2"></i>Entrar
        </button>
    </form>
</div>
{% endblock %}

{% block scripts %}
<script>
    document.getElementById('toggleSenha').addEventListener('click', function () {
        const input = document.getElementById('senha');
        const icone = document.getElementById('iconeSenha');
        if (input.type === 'password') {
            input.type = 'text';
            icone.className = 'bi bi-eye-slash';
        } else {
            input.type = 'password';
            icone.className = 'bi bi-eye';
        }
    });
</script>
{% endblock %}
