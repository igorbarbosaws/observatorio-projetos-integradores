<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Observatório PI{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; }
        .navbar-brand { font-weight: 700; letter-spacing: .5px; }
        .sidebar {
            min-height: calc(100vh - 56px);
            background: #fff;
            border-right: 1px solid #dee2e6;
            padding-top: 1.5rem;
        }
        .sidebar .nav-link {
            color: #495057;
            border-radius: 8px;
            margin-bottom: 4px;
            padding: .5rem 1rem;
        }
        .sidebar .nav-link:hover,
        .sidebar .nav-link.active {
            background: #e9f0ff;
            color: #0d6efd;
        }
        .sidebar .nav-link i { width: 20px; }
        .main-content { padding: 2rem; }
        .card { border: none; box-shadow: 0 1px 4px rgba(0,0,0,.08); border-radius: 12px; }
        .badge-tipo { font-size: .75rem; }
    </style>
</head>
<body>

{% block body %}
<!-- conteúdo padrão (sem autenticação): centralizado -->
<div class="min-vh-100 d-flex align-items-center justify-content-center">
    <div class="w-100" style="max-width:420px; padding:1rem;">
        {% block content %}{% endblock %}
    </div>
</div>
{% endblock %}

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
